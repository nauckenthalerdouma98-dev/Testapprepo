<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Noteworthy</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --accent: #4f5ef7;
            --accent-light: #eef0ff;
            --accent-dark: #3b48d4;
            --border: #e8eaef;
            --border-light: #f0f1f5;
            --online: #22c55e;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --success: #10b981;
            --success-light: #ecfdf5;
            --info: #3b82f6;
            --info-light: #eff6ff;
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.14);
            --radius-xs: 8px;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --radius-2xl: 28px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 14px);
            --safe-top: env(safe-area-inset-top, 0px);
            --note-blue: #e8f0fe;
            --note-green: #e6f7ee;
            --note-yellow: #fef9e7;
            --note-pink: #fde8ef;
            --note-purple: #f2e8fb;
            --note-teal: #e3f5f3;
            --note-orange: #fef3e5;
            --note-gray: #f1f2f4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #1a1a1e;
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .phone-frame {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-width: 430px;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-xl);
        }

        @media (min-width: 431px) {
            .phone-frame {
                height: 92vh;
                height: 92dvh;
                border-radius: 32px;
                margin: 0 16px;
                max-height: 920px;
            }
        }

        @media (min-width: 768px) {
            .phone-frame {
                height: 88vh;
                height: 88dvh;
                border-radius: 36px;
                max-height: 940px;
            }
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px 8px;
            padding-top: max(12px, var(--safe-top));
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--surface);
            letter-spacing: 0.3px;
            flex-shrink: 0;
            z-index: 30;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--online);
            display: inline-block;
            margin-right: 2px;
            vertical-align: middle;
        }

        /* App Header */
        .app-header {
            display: flex;
            align-items: center;
            padding: 6px 14px 10px;
            background: var(--surface);
            flex-shrink: 0;
            gap: 8px;
            border-bottom: 1px solid transparent;
            transition: var(--transition);
            z-index: 20;
            min-height: 50px;
        }
        .app-header.with-border {
            border-bottom-color: var(--border);
        }
        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
            color: var(--text-primary);
            padding: 0;
        }
        .header-btn:active {
            background: var(--border-light);
            transform: scale(0.93);
        }
        .header-btn.accent {
            color: var(--accent);
        }
        .header-btn.accent:active {
            background: var(--accent-light);
        }
        .header-title-group {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .header-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-subtitle {
            font-size: 11px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.1px;
        }
        .header-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            align-items: center;
        }
        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            position: absolute;
            top: 6px;
            right: 6px;
            border: 2px solid var(--surface);
        }

        /* Screens */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: absolute;
            inset: 0;
            top: 0;
            background: var(--bg);
            transition: transform var(--transition-slow), opacity var(--transition-slow);
            z-index: 1;
        }
        .screen.active {
            z-index: 10;
            transform: translateX(0);
            opacity: 1;
            pointer-events: all;
        }
        .screen.inactive-right {
            transform: translateX(30px);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        .screen.inactive-left {
            transform: translateX(-30px);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }
        .screen.hidden-behind {
            transform: translateX(0);
            opacity: 1;
            pointer-events: none;
            z-index: 1;
        }

        /* Notes List Screen */
        .notes-list-screen {
            padding-top: 0;
            display: flex;
            flex-direction: column;
        }
        .search-wrapper {
            padding: 8px 14px;
            flex-shrink: 0;
            background: var(--bg);
            z-index: 5;
        }
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border-radius: 22px;
            padding: 9px 14px;
            gap: 8px;
            transition: var(--transition);
            border: 1.5px solid transparent;
            box-shadow: var(--shadow-xs);
        }
        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 94, 247, 0.08);
        }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font);
            letter-spacing: -0.1px;
        }
        .search-input::placeholder {
            color: var(--text-tertiary);
        }
        .search-clear {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--text-tertiary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
            font-weight: 700;
        }
        .search-clear.visible {
            display: flex;
        }

        /* Category Chips */
        .category-filter {
            display: flex;
            gap: 7px;
            padding: 4px 14px 10px;
            overflow-x: auto;
            flex-shrink: 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: var(--bg);
            z-index: 4;
        }
        .category-filter::-webkit-scrollbar {
            display: none;
        }
        .cat-chip {
            padding: 7px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            background: var(--surface);
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
            flex-shrink: 0;
            letter-spacing: -0.05px;
            user-select: none;
        }
        .cat-chip:active {
            transform: scale(0.95);
        }
        .cat-chip.active {
            background: var(--text-primary);
            color: #fff;
            border-color: var(--text-primary);
        }

        /* Notes Grid */
        .notes-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 2px 10px 100px;
            scroll-behavior: smooth;
        }
        .notes-scroll::-webkit-scrollbar {
            display: none;
        }
        .notes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .notes-list-view {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-tertiary);
            padding: 12px 4px 6px;
            grid-column: 1 / -1;
        }

        /* Note Card */
        .note-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 14px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            box-shadow: var(--shadow-xs);
            border: 1.5px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 90px;
            user-select: none;
            overflow: hidden;
        }
        .note-card:active {
            transform: scale(0.975);
            box-shadow: var(--shadow-md);
        }
        .note-card.pinned {
            border-color: #e0d8f0;
            background: #fdfbff;
        }
        .note-card .color-strip {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 0 3px 3px 0;
        }
        .note-card .pin-indicator {
            position: absolute;
            top: 8px;
            right: 10px;
            color: var(--text-tertiary);
            opacity: 0.7;
        }
        .note-card .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.1px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            padding-right: 18px;
        }
        .note-card .card-preview {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.02px;
        }
        .note-card .card-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: auto;
            letter-spacing: 0.1px;
        }
        .note-card .card-cat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .note-card.list-card {
            flex-direction: row;
            align-items: center;
            gap: 12px;
            min-height: auto;
            padding: 12px 14px;
        }
        .note-card.list-card .card-title {
            font-size: 14px;
            -webkit-line-clamp: 1;
            padding-right: 0;
            flex: 1;
            min-width: 0;
        }
        .note-card.list-card .card-preview {
            display: none;
        }
        .note-card.list-card .card-meta {
            margin-top: 0;
            flex-shrink: 0;
        }
        .note-card.list-card .color-strip {
            width: 3px;
        }
        .note-card.list-card .pin-indicator {
            position: static;
            flex-shrink: 0;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 30px;
            text-align: center;
            grid-column: 1 / -1;
            min-height: 260px;
        }
        .empty-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: var(--accent);
        }
        .empty-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }
        .empty-desc {
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.5;
            max-width: 240px;
        }

        /* FAB */
        .fab {
            position: absolute;
            bottom: max(24px, var(--safe-bottom));
            right: 18px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            z-index: 25;
            box-shadow: 0 6px 20px rgba(79, 94, 247, 0.35);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab:active {
            transform: scale(0.9);
            box-shadow: 0 3px 10px rgba(79, 94, 247, 0.3);
            background: var(--accent-dark);
        }

        /* Editor Screen */
        .editor-screen {
            background: var(--surface);
            z-index: 30;
        }
        .editor-screen.active {
            z-index: 35;
        }
        .editor-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
            z-index: 5;
        }
        .editor-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 14px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .editor-body::-webkit-scrollbar {
            display: none;
        }
        .editor-title-input {
            border: none;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font);
            letter-spacing: -0.3px;
            padding: 4px 0 10px;
            outline: none;
            background: transparent;
            width: 100%;
            resize: none;
            line-height: 1.3;
        }
        .editor-title-input::placeholder {
            color: #d0d3db;
        }
        .editor-content-input {
            border: none;
            font-size: 15px;
            color: var(--text-primary);
            font-family: var(--font);
            letter-spacing: -0.08px;
            padding: 8px 0;
            outline: none;
            background: transparent;
            width: 100%;
            resize: none;
            flex: 1;
            line-height: 1.6;
            min-height: 200px;
        }
        .editor-content-input::placeholder {
            color: #d0d3db;
        }
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 0;
            flex-shrink: 0;
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
        }
        .toolbar-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-tertiary);
            width: 100%;
            margin-bottom: -2px;
        }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .color-swatch:active {
            transform: scale(0.88);
        }
        .color-swatch.selected {
            border-color: var(--text-primary);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.06);
        }
        .color-swatch.none {
            background: #fff;
            border: 2.5px dashed #d0d3db;
        }
        .editor-bottom-actions {
            display: flex;
            gap: 10px;
            padding: 10px 16px;
            padding-bottom: max(10px, var(--safe-bottom));
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
            z-index: 5;
        }
        .btn {
            padding: 11px 20px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            letter-spacing: -0.05px;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            flex: 1;
            box-shadow: 0 2px 8px rgba(79, 94, 247, 0.25);
        }
        .btn-primary:active {
            background: var(--accent-dark);
        }
        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }
        .btn-outline:active {
            background: var(--bg);
        }
        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 18px;
        }
        .btn-danger:active {
            background: #fde8e8;
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 12px;
            border-radius: 16px;
        }
        .char-count {
            font-size: 10px;
            color: var(--text-tertiary);
            text-align: right;
            padding: 2px 0;
            letter-spacing: 0.2px;
        }

        /* Archived Screen */
        .archived-screen {
            background: var(--bg);
        }

        /* Toast Container */
        .toast-container {
            position: absolute;
            top: 60px;
            top: calc(60px + var(--safe-top));
            left: 12px;
            right: 12px;
            z-index: 90;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: #1a1a1a;
            color: #fff;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.05px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.35s ease-out;
            pointer-events: all;
            transition: opacity 0.3s, transform 0.3s;
        }
        .toast.removing {
            opacity: 0;
            transform: translateY(-20px);
        }
        .toast.toast-success {
            border-left: 3px solid var(--success);
        }
        .toast.toast-info {
            border-left: 3px solid var(--info);
        }
        .toast.toast-warning {
            border-left: 3px solid var(--warning);
        }
        .toast.toast-error {
            border-left: 3px solid var(--danger);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .toast-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
        }
        .toast-msg {
            flex: 1;
            min-width: 0;
        }

        /* Confirmation Modal */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 80;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-dialog {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 24px 20px 18px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active .modal-dialog {
            transform: scale(1);
        }
        .modal-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-icon.warn {
            background: var(--warning-light);
            color: var(--warning);
        }
        .modal-icon.danger {
            background: var(--danger-light);
            color: var(--danger);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.15px;
        }
        .modal-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
        }
        .modal-actions .btn {
            flex: 1;
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }

        /* SVG icon base */
        svg.lucide-icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        svg.lucide-icon.sm {
            width: 16px;
            height: 16px;
        }
        svg.lucide-icon.lg {
            width: 24px;
            height: 24px;
        }
        svg.lucide-icon.xl {
            width: 32px;
            height: 32px;
            stroke-width: 1.8;
        }
    </style>
</head>

<body>
    <div class="phone-frame" id="phoneFrame">
        <!-- Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <span style="display:flex;align-items:center;gap:5px;font-size:10px;">
                <span class="status-dot"></span> WiFi &nbsp;🔋
            </span>
        </div>

        <!-- Main Header -->
        <div class="app-header" id="appHeader">
            <button class="header-btn hidden" id="headerBackBtn" aria-label="Back">
                <svg class="lucide-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="header-title-group">
                <div class="header-title" id="headerTitle">Notes</div>
                <div class="header-subtitle" id="headerSubtitle">0 notes</div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="headerArchiveBtn" aria-label="Archived notes" style="position:relative;">
                    <svg class="lucide-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v9a2 2 0 002 2h12a2 2 0 002-2V9"/><path d="M10 13h4"/></svg>
                    <span class="badge-dot hidden" id="archiveBadge"></span>
                </button>
                <button class="header-btn" id="headerViewToggle" aria-label="Toggle view">
                    <svg class="lucide-icon" id="viewToggleIcon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </button>
            </div>
        </div>

        <!-- Notes List Screen -->
        <div class="screen notes-list-screen active" id="notesScreen">
            <div class="search-wrapper">
                <div class="search-bar">
                    <svg class="lucide-icon sm" viewBox="0 0 24 24" style="color:var(--text-tertiary);"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." autocomplete="off">
                    <button class="search-clear" id="searchClear" aria-label="Clear">&#10005;</button>
                </div>
            </div>
            <div class="category-filter" id="categoryFilter">
                <span class="cat-chip active" data-cat="all">All</span>
            </div>
            <div class="notes-scroll" id="notesScroll">
                <div class="notes-grid" id="notesGrid"></div>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">
                        <svg class="lucide-icon xl" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    </div>
                    <div class="empty-title">No notes yet</div>
                    <div class="empty-desc">Tap the + button to create your first note</div>
                </div>
            </div>
            <button class="fab" id="fabNewNote" aria-label="New note">
                <svg class="lucide-icon lg" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>

        <!-- Editor Screen -->
        <div class="screen editor-screen inactive-right" id="editorScreen">
            <div class="editor-header">
                <button class="header-btn" id="editorBackBtn" aria-label="Back">
                    <svg class="lucide-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div style="flex:1;"></div>
                <button class="header-btn accent" id="editorPinBtn" aria-label="Pin note">
                    <svg class="lucide-icon" viewBox="0 0 24 24"><path d="M12 17v5M9 10.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24V16a1 1 0 001 1h12a1 1 0 001-1v-.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V7a1 1 0 011-1 2 2 0 000-4H8a2 2 0 000 4 1 1 0 011 1v3.76z"/></svg>
                </button>
                <button class="header-btn accent" id="editorDeleteBtn" aria-label="Delete note" style="color:var(--danger);">
                    <svg class="lucide-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
                </button>
            </div>
            <div class="editor-body">
                <input type="text" class="editor-title-input" id="editorTitle" placeholder="Note title..." autocomplete="off">
                <div class="char-count" id="charCount">0 characters</div>
                <textarea class="editor-content-input" id="editorContent" placeholder="Start writing..." rows="8"></textarea>
                <div class="editor-toolbar">
                    <span class="toolbar-label">Category</span>
                    <div id="editorCatChips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                    <span class="toolbar-label" style="margin-top:6px;">Color Accent</span>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;" id="colorPalette"></div>
                </div>
            </div>
            <div class="editor-bottom-actions">
                <button class="btn btn-outline btn-sm" id="editorArchiveActionBtn">
                    <svg class="lucide-icon sm" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v9a2 2 0 002 2h12a2 2 0 002-2V9"/></svg>
                    Archive
                </button>
                <button class="btn btn-primary" id="editorSaveBtn">
                    <svg class="lucide-icon sm" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                    Save Note
                </button>
            </div>
        </div>

        <!-- Archived Screen -->
        <div class="screen archived-screen inactive-right" id="archivedScreen">
            <div style="padding:14px 16px;flex-shrink:0;background:var(--bg);">
                <div style="display:flex;align-items:center;gap:8px;">
                    <button class="header-btn" id="archivedBackBtn" aria-label="Back">
                        <svg class="lucide-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <span style="font-size:17px;font-weight:700;letter-spacing:-0.2px;">Archived</span>
                </div>
            </div>
            <div class="notes-scroll" id="archivedScroll">
                <div class="notes-grid" id="archivedGrid"></div>
                <div class="empty-state" id="archivedEmpty">
                    <div class="empty-icon">
                        <svg class="lucide-icon xl" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v9a2 2 0 002 2h12a2 2 0 002-2V9"/></svg>
                    </div>
                    <div class="empty-title">No archived notes</div>
                    <div class="empty-desc">Archived notes will appear here</div>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Confirmation Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-dialog">
                <div class="modal-icon warn" id="modalIcon">
                    <svg class="lucide-icon lg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div class="modal-title" id="modalTitle">Confirm</div>
                <div class="modal-desc" id="modalDesc">Are you sure?</div>
                <div class="modal-actions">
                    <button class="btn btn-outline btn-sm" id="modalCancelBtn">Cancel</button>
                    <button class="btn btn-primary btn-sm" id="modalConfirmBtn">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ────────────────────────────────────
            // ICONS - Lucide-style SVG helpers
            // ────────────────────────────────────
            function svgIcon(pathData, sizeClass = '') {
                return `<svg class="lucide-icon ${sizeClass}" viewBox="0 0 24 24">${pathData}</svg>`;
            }
            const Icons = {
                plus: '<path d="M12 5v14M5 12h14"/>',
                search: '<circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>',
                x: '<path d="M18 6L6 18M6 6l12 12"/>',
                chevronLeft: '<path d="M15 18l-6-6 6-6"/>',
                pin: '<path d="M12 17v5M9 10.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24V16a1 1 0 001 1h12a1 1 0 001-1v-.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V7a1 1 0 011-1 2 2 0 000-4H8a2 2 0 000 4 1 1 0 011 1v3.76z"/>',
                archive: '<rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v9a2 2 0 002 2h12a2 2 0 002-2V9"/><path d="M10 13h4"/>',
                trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>',
                check: '<path d="M20 6L9 17l-5-5"/>',
                grid: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
                list: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
                file: '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>',
                alertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
                info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
                folder: '<path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>',
            };

            function iconHTML(name, sizeClass = '') {
                const pathData = Icons[name] || Icons.info;
                return svgIcon(pathData, sizeClass);
            }

            // ────────────────────────────────────
            // DATA & STATE
            // ────────────────────────────────────
            const STORAGE_KEY = 'noteworthy_data';
            const DEFAULT_CATEGORIES = ['Personal', 'Work', 'Ideas', 'Tasks', 'Reference'];
            const NOTE_COLORS = [
                { name: 'none', hex: '', bg: '#ffffff', label: 'None' },
                { name: 'blue', hex: '#4f8cf7', bg: '#e8f0fe', label: 'Blue' },
                { name: 'green', hex: '#10b981', bg: '#e6f7ee', label: 'Green' },
                { name: 'yellow', hex: '#f59e0b', bg: '#fef9e7', label: 'Yellow' },
                { name: 'pink', hex: '#ec4899', bg: '#fde8ef', label: 'Pink' },
                { name: 'purple', hex: '#8b5cf6', bg: '#f2e8fb', label: 'Purple' },
                { name: 'teal', hex: '#14b8a6', bg: '#e3f5f3', label: 'Teal' },
                { name: 'orange', hex: '#f97316', bg: '#fef3e5', label: 'Orange' },
            ];

            let state = {
                notes: [],
                categories: [...DEFAULT_CATEGORIES],
                currentView: 'notes', // 'notes' | 'editor' | 'archived'
                editingNoteId: null,
                searchQuery: '',
                activeCategory: 'all',
                viewMode: 'grid', // 'grid' | 'list'
            };

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        state.notes = parsed.notes || [];
                        state.categories = parsed.categories || [...DEFAULT_CATEGORIES];
                        state.viewMode = parsed.viewMode || 'grid';
                    }
                } catch (e) {
                    state.notes = [];
                    state.categories = [...DEFAULT_CATEGORIES];
                }
            }

            function saveState() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        notes: state.notes,
                        categories: state.categories,
                        viewMode: state.viewMode,
                    }));
                } catch (e) {
                    showToast('Could not save data', 'error');
                }
            }

            function generateId() {
                return 'note_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
            }

            function getActiveNotes() {
                return state.notes.filter(n => !n.archived);
            }

            function getArchivedNotes() {
                return state.notes.filter(n => n.archived);
            }

            function getFilteredNotes() {
                let notes = getActiveNotes();
                if (state.activeCategory !== 'all') {
                    notes = notes.filter(n => n.category === state.activeCategory);
                }
                if (state.searchQuery.trim()) {
                    const q = state.searchQuery.toLowerCase();
                    notes = notes.filter(n =>
                        n.title.toLowerCase().includes(q) ||
                        n.content.toLowerCase().includes(q)
                    );
                }
                // Sort: pinned first, then by updatedAt desc
                notes.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return b.updatedAt - a.updatedAt;
                });
                return notes;
            }

            function getNoteById(id) {
                return state.notes.find(n => n.id === id);
            }

            // ────────────────────────────────────
            // DOM REFS
            // ────────────────────────────────────
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const appHeader = $('#appHeader');
            const headerBackBtn = $('#headerBackBtn');
            const headerTitle = $('#headerTitle');
            const headerSubtitle = $('#headerSubtitle');
            const headerArchiveBtn = $('#headerArchiveBtn');
            const archiveBadge = $('#archiveBadge');
            const headerViewToggle = $('#headerViewToggle');
            const viewToggleIcon = $('#viewToggleIcon');
            const notesScreen = $('#notesScreen');
            const editorScreen = $('#editorScreen');
            const archivedScreen = $('#archivedScreen');
            const searchInput = $('#searchInput');
            const searchClear = $('#searchClear');
            const categoryFilter = $('#categoryFilter');
            const notesGrid = $('#notesGrid');
            const notesScroll = $('#notesScroll');
            const emptyState = $('#emptyState');
            const fabNewNote = $('#fabNewNote');
            const editorTitle = $('#editorTitle');
            const editorContent = $('#editorContent');
            const charCount = $('#charCount');
            const editorCatChips = $('#editorCatChips');
            const colorPalette = $('#colorPalette');
            const editorSaveBtn = $('#editorSaveBtn');
            const editorBackBtn = $('#editorBackBtn');
            const editorDeleteBtn = $('#editorDeleteBtn');
            const editorPinBtn = $('#editorPinBtn');
            const editorArchiveActionBtn = $('#editorArchiveActionBtn');
            const archivedGrid = $('#archivedGrid');
            const archivedScroll = $('#archivedScroll');
            const archivedEmpty = $('#archivedEmpty');
            const archivedBackBtn = $('#archivedBackBtn');
            const toastContainer = $('#toastContainer');
            const modalOverlay = $('#modalOverlay');
            const modalTitle = $('#modalTitle');
            const modalDesc = $('#modalDesc');
            const modalIcon = $('#modalIcon');
            const modalCancelBtn = $('#modalCancelBtn');
            const modalConfirmBtn = $('#modalConfirmBtn');

            let modalResolve = null;

            // ────────────────────────────────────
            // TOAST NOTIFICATIONS
            // ────────────────────────────────────
            function showToast(message, type = 'info', duration = 2200) {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                let iconSvg = Icons.info;
                if (type === 'success') iconSvg = Icons.check;
                if (type === 'error') iconSvg = Icons.x;
                if (type === 'warning') iconSvg = Icons.alertCircle;
                toast.innerHTML = `
              <span class="toast-icon">${svgIcon(iconSvg, '')}</span>
              <span class="toast-msg">${escapeHTML(message)}</span>
            `;
                toastContainer.appendChild(toast);

                const remove = () => {
                    toast.classList.add('removing');
                    setTimeout(() => {
                        if (toast.parentNode) toast.parentNode.removeChild(toast);
                    }, 300);
                };
                const timer = setTimeout(remove, duration);
                toast.addEventListener('click', () => {
                    clearTimeout(timer);
                    remove();
                });
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ────────────────────────────────────
            // CONFIRMATION MODAL
            // ────────────────────────────────────
            function showConfirm(title, desc, type = 'warn', confirmLabel = 'Confirm') {
                return new Promise((resolve) => {
                    modalResolve = resolve;
                    modalTitle.textContent = title;
                    modalDesc.textContent = desc;
                    modalConfirmBtn.textContent = confirmLabel;
                    modalIcon.className = 'modal-icon ' + (type === 'danger' ? 'danger' : 'warn');
                    modalIcon.innerHTML = type === 'danger' ?
                        svgIcon(Icons.trash, 'lg') : svgIcon(Icons.alertCircle, 'lg');
                    modalOverlay.classList.add('active');
                });
            }

            function hideModal(result) {
                modalOverlay.classList.remove('active');
                if (modalResolve) {
                    modalResolve(result);
                    modalResolve = null;
                }
            }

            modalCancelBtn.addEventListener('click', () => hideModal(false));
            modalConfirmBtn.addEventListener('click', () => hideModal(true));
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) hideModal(false);
            });

            // ────────────────────────────────────
            // SCREEN NAVIGATION
            // ────────────────────────────────────
            function showScreen(screenName) {
                state.currentView = screenName;
                [notesScreen, editorScreen, archivedScreen].forEach(s => {
                    s.classList.remove('active', 'inactive-right', 'inactive-left',
                    'hidden-behind');
                });

                if (screenName === 'notes') {
                    notesScreen.classList.add('active');
                    editorScreen.classList.add('inactive-right');
                    archivedScreen.classList.add('inactive-right');
                    headerBackBtn.classList.add('hidden');
                    headerTitle.textContent = 'Notes';
                    headerArchiveBtn.classList.remove('hidden');
                    headerViewToggle.classList.remove('hidden');
                    appHeader.classList.remove('with-border');
                    updateHeaderSubtitle();
                    updateArchiveBadge();
                    renderCategoryFilter();
                    renderNotes();
                } else if (screenName === 'editor') {
                    editorScreen.classList.add('active');
                    notesScreen.classList.add('hidden-behind');
                    archivedScreen.classList.add('inactive-right');
                    headerBackBtn.classList.add('hidden');
                    headerArchiveBtn.classList.add('hidden');
                    headerViewToggle.classList.add('hidden');
                    appHeader.classList.add('with-border');
                    headerTitle.textContent = state.editingNoteId ? 'Edit Note' : 'New Note';
                    headerSubtitle.textContent = '';
                } else if (screenName === 'archived') {
                    archivedScreen.classList.add('active');
                    notesScreen.classList.add('hidden-behind');
                    editorScreen.classList.add('inactive-right');
                    headerBackBtn.classList.add('hidden');
                    headerArchiveBtn.classList.add('hidden');
                    headerViewToggle.classList.add('hidden');
                    appHeader.classList.add('with-border');
                    headerTitle.textContent = 'Archived';
                    headerSubtitle.textContent = '';
                    renderArchivedNotes();
                }
                updateViewToggleIcon();
            }

            function updateHeaderSubtitle() {
                const active = getActiveNotes();
                const count = active.length;
                headerSubtitle.textContent = count === 0 ? 'No notes' :
                    count === 1 ? '1 note' : `${count} notes`;
            }

            function updateArchiveBadge() {
                const archivedCount = getArchivedNotes().length;
                if (archivedCount > 0) {
                    archiveBadge.classList.remove('hidden');
                } else {
                    archiveBadge.classList.add('hidden');
                }
            }

            function updateViewToggleIcon() {
                if (state.viewMode === 'grid') {
                    viewToggleIcon.innerHTML = Icons.list;
                } else {
                    viewToggleIcon.innerHTML = Icons.grid;
                }
            }

            // ────────────────────────────────────
            // RENDER CATEGORY FILTER
            // ────────────────────────────────────
            function renderCategoryFilter() {
                const chips = categoryFilter.querySelectorAll('.cat-chip');
                chips.forEach(c => c.remove());
                const allChip = document.createElement('span');
                allChip.className = 'cat-chip' + (state.activeCategory === 'all' ? ' active' : '');
                allChip.setAttribute('data-cat', 'all');
                allChip.textContent = 'All';
                allChip.addEventListener('click', () => {
                    state.activeCategory = 'all';
                    renderCategoryFilter();
                    renderNotes();
                });
                categoryFilter.appendChild(allChip);

                state.categories.forEach(cat => {
                    const chip = document.createElement('span');
                    chip.className = 'cat-chip' + (state.activeCategory === cat ? ' active' : '');
                    chip.setAttribute('data-cat', cat);
                    chip.textContent = cat;
                    chip.addEventListener('click', () => {
                        state.activeCategory = cat;
                        renderCategoryFilter();
                        renderNotes();
                    });
                    categoryFilter.appendChild(chip);
                });
            }

            // ────────────────────────────────────
            // RENDER NOTES
            // ────────────────────────────────────
            function renderNotes() {
                const filtered = getFilteredNotes();
                notesGrid.innerHTML = '';
                notesGrid.className = state.viewMode === 'grid' ? 'notes-grid' : 'notes-list-view';

                if (filtered.length === 0) {
                    emptyState.classList.remove('hidden');
                    if (state.searchQuery.trim() || state.activeCategory !== 'all') {
                        emptyState.querySelector('.empty-title').textContent = 'No matches';
                        emptyState.querySelector('.empty-desc').textContent =
                            'Try adjusting your search or filter';
                    } else {
                        emptyState.querySelector('.empty-title').textContent = 'No notes yet';
                        emptyState.querySelector('.empty-desc').textContent =
                            'Tap the + button to create your first note';
                    }
                } else {
                    emptyState.classList.add('hidden');
                }

                let hasPinned = false;
                let hasUnpinned = false;
                filtered.forEach(n => {
                    if (n.pinned) hasPinned = true;
                    else hasUnpinned = true;
                });

                let shownPinnedLabel = false;
                let shownUnpinnedLabel = false;

                filtered.forEach(note => {
                    if (note.pinned && !shownPinnedLabel && hasPinned && hasUnpinned) {
                        const label = document.createElement('div');
                        label.className = 'section-label';
                        label.textContent = 'Pinned';
                        if (state.viewMode === 'grid') label.style.gridColumn = '1 / -1';
                        notesGrid.appendChild(label);
                        shownPinnedLabel = true;
                    }
                    if (!note.pinned && !shownUnpinnedLabel && hasPinned && hasUnpinned) {
                        const label = document.createElement('div');
                        label.className = 'section-label';
                        label.textContent = 'Other Notes';
                        if (state.viewMode === 'grid') label.style.gridColumn = '1 / -1';
                        notesGrid.appendChild(label);
                        shownUnpinnedLabel = true;
                    }

                    const card = createNoteCard(note);
                    notesGrid.appendChild(card);
                });

                updateHeaderSubtitle();
                updateArchiveBadge();
            }

            function createNoteCard(note) {
                const card = document.createElement('div');
                card.className = 'note-card' + (note.pinned ? ' pinned' : '') + (state.viewMode ===
                    'list' ? ' list-card' : '');
                card.setAttribute('data-note-id', note.id);

                const colorInfo = NOTE_COLORS.find(c => c.name === note.color) || NOTE_COLORS[0];
                const stripColor = colorInfo.hex || 'transparent';
                const bgTint = note.color && colorInfo.bg ? colorInfo.bg : '#ffffff';
                if (note.color) {
                    card.style.background = bgTint;
                }

                const preview = note.content.length > 80 ?
                    note.content.substring(0, 80).trim() + '...' :
                    note.content;

                const dateStr = new Date(note.updatedAt).toLocaleDateString(undefined, {
                    month: 'short',
                    day: 'numeric'
                });
                const timeStr = new Date(note.updatedAt).toLocaleTimeString([], {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                card.innerHTML = `
              ${stripColor !== 'transparent' ? `<div class="color-strip" style="background:${stripColor};"></div>` : ''}
              ${note.pinned ? `<span class="pin-indicator">${iconHTML('pin', 'sm')}</span>` : ''}
              <div class="card-title">${escapeHTML(note.title || 'Untitled')}</div>
              ${state.viewMode === 'grid' ? `<div class="card-preview">${escapeHTML(preview || 'No content')}</div>` : ''}
              <div class="card-meta">
                ${note.category ? `<span class="card-cat-dot" style="background:${getCatColor(note.category)};"></span><span>${escapeHTML(note.category)}</span>` : ''}
                <span style="margin-left:auto;">${dateStr} &middot; ${timeStr}</span>
              </div>
            `;

                card.addEventListener('click', () => openEditor(note.id));
                card.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showNoteContextMenu(note, e);
                });
                // Long press for context
                let longPressTimer;
                card.addEventListener('touchstart', () => {
                    longPressTimer = setTimeout(() => {
                        showNoteQuickActions(note);
                    }, 500);
                }, { passive: true });
                card.addEventListener('touchend', () => clearTimeout(longPressTimer));
                card.addEventListener('touchmove', () => clearTimeout(longPressTimer));

                return card;
            }

            function getCatColor(catName) {
                const idx = state.categories.indexOf(catName);
                const catColors = ['#4f8cf7', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#14b8a6',
                    '#f97316', '#6366f1'
                ];
                return catColors[idx % catColors.length] || '#6b7280';
            }

            async function showNoteQuickActions(note) {
                const action = await showConfirm(
                    'Note Actions',
                    `"${note.title || 'Untitled'}"`,
                    'warn',
                    'Delete'
                );
                if (action) {
                    const confirmed = await showConfirm(
                        'Delete Note',
                        'This note will be permanently deleted.',
                        'danger',
                        'Delete'
                    );
                    if (confirmed) {
                        deleteNote(note.id);
                    }
                }
            }

            function showNoteContextMenu(note, event) {
                showNoteQuickActions(note);
            }

            // ────────────────────────────────────
            // NOTE CRUD
            // ────────────────────────────────────
            function createNote() {
                const note = {
                    id: generateId(),
                    title: '',
                    content: '',
                    category: '',
                    color: 'none',
                    pinned: false,
                    archived: false,
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                };
                state.notes.unshift(note);
                saveState();
                return note;
            }

            function saveNoteData(id, data) {
                const note = getNoteById(id);
                if (!note) return;
                Object.assign(note, data, { updatedAt: Date.now() });
                saveState();
            }

            function deleteNote(id) {
                state.notes = state.notes.filter(n => n.id !== id);
                saveState();
                showToast('Note deleted', 'info');
                if (state.currentView === 'editor' && state.editingNoteId === id) {
                    closeEditor();
                }
                renderNotes();
                renderArchivedNotes();
                updateHeaderSubtitle();
                updateArchiveBadge();
            }

            function toggleArchiveNote(id) {
                const note = getNoteById(id);
                if (!note) return;
                note.archived = !note.archived;
                note.updatedAt = Date.now();
                saveState();
                if (note.archived) {
                    showToast('Note archived', 'success');
                } else {
                    showToast('Note restored', 'success');
                }
                if (state.currentView === 'editor' && state.editingNoteId === id) {
                    closeEditor();
                }
                renderNotes();
                renderArchivedNotes();
                updateHeaderSubtitle();
                updateArchiveBadge();
            }

            function togglePinNote(id) {
                const note = getNoteById(id);
                if (!note) return;
                note.pinned = !note.pinned;
                note.updatedAt = Date.now();
                saveState();
                showToast(note.pinned ? 'Note pinned' : 'Note unpinned', 'info');
                renderNotes();
                updateEditorPinButton();
            }

            // ────────────────────────────────────
            // EDITOR
            // ────────────────────────────────────
            function openEditor(noteId) {
                state.editingNoteId = noteId;
                const note = noteId ? getNoteById(noteId) : createNote();
                if (!noteId) {
                    state.editingNoteId = note.id;
                }
                editorTitle.value = note.title || '';
                editorContent.value = note.content || '';
                updateCharCount();
                renderEditorCategories(note);
                renderColorPalette(note);
                updateEditorPinButton();
                updateEditorArchiveButton(note);
                showScreen('editor');
                editorDeleteBtn.classList.toggle('hidden', !noteId);
                setTimeout(() => editorTitle.focus(), 350);
                if (!noteId) {
                    showToast('New note created', 'success');
                }
            }

            function closeEditor() {
                state.editingNoteId = null;
                editorTitle.value = '';
                editorContent.value = '';
                updateCharCount();
                showScreen('notes');
                renderNotes();
                updateHeaderSubtitle();
                updateArchiveBadge();
            }

            function saveCurrentNote() {
                if (!state.editingNoteId) return;
                const note = getNoteById(state.editingNoteId);
                if (!note) return;
                const title = editorTitle.value.trim();
                const content = editorContent.value.trim();
                if (!title && !content) {
                    showToast('Note is empty, not saved', 'warning');
                    return;
                }
                saveNoteData(state.editingNoteId, { title, content });
                showToast('Note saved', 'success');
                renderNotes();
                updateHeaderSubtitle();
            }

            function updateCharCount() {
                const len = editorContent.value.length;
                charCount.textContent = len === 0 ? '0 characters' :
                    len === 1 ? '1 character' : `${len} characters`;
            }

            function updateEditorPinButton() {
                if (!state.editingNoteId) {
                    editorPinBtn.style.opacity = '0.5';
                    return;
                }
                const note = getNoteById(state.editingNoteId);
                editorPinBtn.style.opacity = note && note.pinned ? '1' : '0.5';
                editorPinBtn.style.color = note && note.pinned ? 'var(--accent)' : 'var(--text-tertiary)';
            }

            function updateEditorArchiveButton(note) {
                if (!note) return;
                editorArchiveActionBtn.innerHTML = note.archived ?
                    `${iconHTML('folder', 'sm')} Unarchive` :
                    `${iconHTML('archive', 'sm')} Archive`;
            }

            function renderEditorCategories(note) {
                editorCatChips.innerHTML = '';
                const noneChip = document.createElement('span');
                noneChip.className = 'cat-chip' + (!note.category ? ' active' : '');
                noneChip.textContent = 'None';
                noneChip.addEventListener('click', () => {
                    if (state.editingNoteId) {
                        saveNoteData(state.editingNoteId, { category: '' });
                        renderEditorCategories(getNoteById(state.editingNoteId));
                    }
                });
                editorCatChips.appendChild(noneChip);

                state.categories.forEach(cat => {
                    const chip = document.createElement('span');
                    chip.className = 'cat-chip' + (note.category === cat ? ' active' : '');
                    chip.textContent = cat;
                    chip.addEventListener('click', () => {
                        if (state.editingNoteId) {
                            saveNoteData(state.editingNoteId, { category: cat });
                            renderEditorCategories(getNoteById(state.editingNoteId));
                        }
                    });
                    editorCatChips.appendChild(chip);
                });
            }

            function renderColorPalette(note) {
                colorPalette.innerHTML = '';
                NOTE_COLORS.forEach(colorInfo => {
                    const swatch = document.createElement('div');
                    swatch.className = 'color-swatch' + (note.color === colorInfo.name ? ' selected' :
                        '') + (colorInfo.name === 'none' ? ' none' : '');
                    if (colorInfo.name !== 'none') {
                        swatch.style.background = colorInfo.bg;
                        swatch.style.borderColor = colorInfo.hex;
                    }
                    swatch.setAttribute('data-color', colorInfo.name);
                    swatch.title = colorInfo.label;
                    swatch.addEventListener('click', () => {
                        if (state.editingNoteId) {
                            saveNoteData(state.editingNoteId, { color: colorInfo.name });
                            renderColorPalette(getNoteById(state.editingNoteId));
                        }
                    });
                    colorPalette.appendChild(swatch);
                });
            }

            // ────────────────────────────────────
            // ARCHIVED NOTES
            // ────────────────────────────────────
            function renderArchivedNotes() {
                const archived = getArchivedNotes();
                archivedGrid.innerHTML = '';
                archivedGrid.className = 'notes-grid';

                if (archived.length === 0) {
                    archivedEmpty.classList.remove('hidden');
                } else {
                    archivedEmpty.classList.add('hidden');
                }

                archived.sort((a, b) => b.updatedAt - a.updatedAt).forEach(note => {
                    const card = createNoteCard(note);
                    card.addEventListener('click', () => {
                        toggleArchiveNote(note.id);
                        renderArchivedNotes();
                        renderNotes();
                        updateHeaderSubtitle();
                        updateArchiveBadge();
                    });
                    archivedGrid.appendChild(card);
                });
                updateArchiveBadge();
            }

            // ────────────────────────────────────
            // EVENT LISTENERS
            // ────────────────────────────────────
            headerBackBtn.addEventListener('click', () => {
                if (state.currentView === 'editor') {
                    if (editorTitle.value.trim() || editorContent.value.trim()) {
                        saveCurrentNote();
                    }
                    closeEditor();
                }
            });

            headerArchiveBtn.addEventListener('click', () => {
                showScreen('archived');
            });

            headerViewToggle.addEventListener('click', () => {
                state.viewMode = state.viewMode === 'grid' ? 'list' : 'grid';
                saveState();
                updateViewToggleIcon();
                renderNotes();
                showToast(state.viewMode === 'grid' ? 'Grid view' : 'List view', 'info');
            });

            archivedBackBtn.addEventListener('click', () => {
                showScreen('notes');
            });

            searchInput.addEventListener('input', () => {
                state.searchQuery = searchInput.value;
                if (state.searchQuery.trim()) {
                    searchClear.classList.add('visible');
                } else {
                    searchClear.classList.remove('visible');
                }
                renderNotes();
            });

            searchClear.addEventListener('click', () => {
                searchInput.value = '';
                state.searchQuery = '';
                searchClear.classList.remove('visible');
                renderNotes();
                searchInput.focus();
            });

            fabNewNote.addEventListener('click', () => {
                openEditor(null);
            });

            editorSaveBtn.addEventListener('click', () => {
                saveCurrentNote();
                closeEditor();
            });

            editorBackBtn.addEventListener('click', () => {
                if (editorTitle.value.trim() || editorContent.value.trim()) {
                    saveCurrentNote();
                }
                closeEditor();
            });

            editorDeleteBtn.addEventListener('click', async () => {
                if (!state.editingNoteId) return;
                const note = getNoteById(state.editingNoteId);
                const confirmed = await showConfirm(
                    'Delete Note',
                    `Permanently delete "${note?.title || 'Untitled'}"?`,
                    'danger',
                    'Delete'
                );
                if (confirmed) {
                    const idToDelete = state.editingNoteId;
                    closeEditor();
                    deleteNote(idToDelete);
                }
            });

            editorPinBtn.addEventListener('click', () => {
                if (state.editingNoteId) {
                    togglePinNote(state.editingNoteId);
                }
            });

            editorArchiveActionBtn.addEventListener('click', () => {
                if (state.editingNoteId) {
                    const note = getNoteById(state.editingNoteId);
                    toggleArchiveNote(state.editingNoteId);
                    if (note && !note.archived) {
                        // Was just archived
                        closeEditor();
                    }
                    updateEditorArchiveButton(getNoteById(state.editingNoteId));
                    renderNotes();
                    updateHeaderSubtitle();
                    updateArchiveBadge();
                }
            });

            editorTitle.addEventListener('input', () => {
                if (state.editingNoteId) {
                    saveNoteData(state.editingNoteId, { title: editorTitle.value });
                }
            });

            editorContent.addEventListener('input', () => {
                updateCharCount();
                if (state.editingNoteId) {
                    saveNoteData(state.editingNoteId, { content: editorContent.value });
                }
                // Auto-save feedback (throttled visual only)
                if (!editorContent._autoSaveTimeout) {
                    editorContent._autoSaveTimeout = setTimeout(() => {
                        editorContent._autoSaveTimeout = null;
                    }, 800);
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (state.currentView === 'editor') {
                        if (editorTitle.value.trim() || editorContent.value.trim()) {
                            saveCurrentNote();
                        }
                        closeEditor();
                    } else if (state.currentView === 'archived') {
                        showScreen('notes');
                    }
                }
                if ((e.metaKey || e.ctrlKey) && e.key === 's' && state.currentView === 'editor') {
                    e.preventDefault();
                    saveCurrentNote();
                    showToast('Note saved', 'success');
                }
                if ((e.metaKey || e.ctrlKey) && e.key === 'n' && state.currentView === 'notes') {
                    e.preventDefault();
                    openEditor(null);
                }
            });

            // ────────────────────────────────────
            // INIT
            // ────────────────────────────────────
            function init() {
                loadState();
                renderCategoryFilter();
                renderNotes();
                updateHeaderSubtitle();
                updateArchiveBadge();
                updateViewToggleIcon();
                updateCharCount();
                showScreen('notes');
                // Ensure editor is hidden on load
                editorScreen.classList.remove('active');
                editorScreen.classList.add('inactive-right');
                archivedScreen.classList.remove('active');
                archivedScreen.classList.add('inactive-right');
                notesScreen.classList.add('active');
                headerBackBtn.classList.add('hidden');
                headerArchiveBtn.classList.remove('hidden');
                headerViewToggle.classList.remove('hidden');
                headerTitle.textContent = 'Notes';
                appHeader.classList.remove('with-border');
            }

            init();

            // ────────────────────────────────────
            // SERVICE WORKER REGISTRATION
            // ────────────────────────────────────
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {
                    // Silent fail - app works offline without SW
                });
            }
        })();
    </script>
</body>

</html>
